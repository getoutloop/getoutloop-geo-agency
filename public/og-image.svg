<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0D1429;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060917;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FF9D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FF9D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A8FF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00FF9D;stop-opacity:0.6" />
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative glow top-left -->
  <ellipse cx="150" cy="150" rx="280" ry="200" fill="#00A8FF" opacity="0.04"/>
  <!-- Decorative glow bottom-right -->
  <ellipse cx="1050" cy="500" rx="280" ry="200" fill="#00FF9D" opacity="0.04"/>

  <!-- Top badge pill -->
  <rect x="400" y="80" width="400" height="44" rx="22" fill="rgba(0,168,255,0.08)" stroke="rgba(0,168,255,0.35)" stroke-width="1"/>
  <!-- Pulse dot -->
  <circle cx="422" cy="102" r="5" fill="#00FF9D"/>
  <!-- Badge text -->
  <text x="600" y="108" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#00A8FF" text-anchor="middle" letter-spacing="2">GEO AGENCY · MALAYSIA &amp; SINGAPORE · APAC</text>

  <!-- Main headline line 1 — gradient text via filled rect + clip -->
  <text x="600" y="215" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900" fill="url(#textGrad)" text-anchor="middle">Get Cited by AI.</text>

  <!-- Main headline line 2 -->
  <text x="600" y="305" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900" fill="#FFFFFF" text-anchor="middle">Get Found by Everyone.</text>

  <!-- Divider line -->
  <line x1="440" y1="340" x2="760" y2="340" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Subtext -->
  <text x="600" y="390" font-family="Arial, sans-serif" font-size="24" fill="rgba(176,184,200,0.75)" text-anchor="middle">Expert GEO audits for ChatGPT, Perplexity &amp; Google AI Overviews</text>

  <!-- Stats row -->
  <g transform="translate(240, 435)">
    <!-- Stat 1 -->
    <text x="0" y="30" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="url(#textGrad)" text-anchor="middle">FREE</text>
    <text x="0" y="52" font-family="Arial, sans-serif" font-size="13" fill="rgba(176,184,200,0.6)" text-anchor="middle">GEO Audit</text>
    <!-- Separator -->
    <line x1="80" y1="15" x2="80" y2="55" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Stat 2 -->
    <text x="160" y="30" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="url(#textGrad)" text-anchor="middle">24hr</text>
    <text x="160" y="52" font-family="Arial, sans-serif" font-size="13" fill="rgba(176,184,200,0.6)" text-anchor="middle">Delivery</text>
    <!-- Separator -->
    <line x1="240" y1="15" x2="240" y2="55" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Stat 3 -->
    <text x="320" y="30" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="url(#textGrad)" text-anchor="middle">8</text>
    <text x="320" y="52" font-family="Arial, sans-serif" font-size="13" fill="rgba(176,184,200,0.6)" text-anchor="middle">Dimensions</text>
    <!-- Separator -->
    <line x1="400" y1="15" x2="400" y2="55" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Stat 4 -->
    <text x="480" y="30" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="url(#textGrad)" text-anchor="middle">5</text>
    <text x="480" y="52" font-family="Arial, sans-serif" font-size="13" fill="rgba(176,184,200,0.6)" text-anchor="middle">AI Platforms</text>
  </g>

  <!-- Bottom brand bar -->
  <rect x="0" y="548" width="1200" height="82" fill="rgba(0,0,0,0.25)"/>
  <line x1="0" y1="548" x2="1200" y2="548" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="566" width="46" height="46" rx="10" fill="url(#logoGrad)"/>
  <text x="103" y="596" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#0A0E27" text-anchor="middle">GL</text>

  <!-- Brand name -->
  <text x="140" y="586" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">GetOutLoop</text>
  <text x="141" y="604" font-family="Arial, sans-serif" font-size="12" fill="rgba(176,184,200,0.5)" letter-spacing="2">AI VISIBILITY AGENCY</text>

  <!-- Right side URL -->
  <text x="1120" y="586" font-family="Arial, sans-serif" font-size="16" fill="rgba(176,184,200,0.5)" text-anchor="end">getoutloop.com</text>
  <text x="1120" y="606" font-family="Arial, sans-serif" font-size="13" fill="rgba(0,168,255,0.6)" text-anchor="end">Get cited by AI today →</text>
</svg>
